name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
          
      - name: Run Backend Tests
        working-directory: ./backend
        run: |
          pytest --cov=. --cov-report=json > /dev/null
          
      - name: Provide Backend Coverage Percentage
        id: backend-cov
        working-directory: ./backend
        run: |
          export TOTAL=$(python -c "import json; print(json.load(open('coverage.json'))['totals']['percent_covered_display'])")
          echo "backend_cov=$TOTAL" >> $GITHUB_ENV
          
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install
          
      - name: Run Frontend Tests
        working-directory: ./frontend
        run: |
          npx vitest run --coverage --coverage.reporter=json-summary --coverage.reporter=text
          
      - name: Provide Frontend Coverage Percentage
        id: frontend-cov
        working-directory: ./frontend
        run: |
          export TOTAL=$(node -e "const summary = require('./coverage/coverage-summary.json'); console.log(summary.total.statements.pct.toFixed(0));")
          echo "frontend_cov=$TOTAL" >> $GITHUB_ENV
          
      - name: Update Badges in README
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          B_COLOR=$(python -c "c=float('${{ env.backend_cov }}'); print('brightgreen' if c>=90 else 'yellow' if c>=75 else 'red')")
          F_COLOR=$(python -c "c=float('${{ env.frontend_cov }}'); print('brightgreen' if c>=90 else 'yellow' if c>=75 else 'red')")
          
          sed -i "s|!\[Backend Coverage\].*|![Backend Coverage](https://img.shields.io/badge/Backend_Coverage-${{ env.backend_cov }}%25-${B_COLOR})|g" README.md
          sed -i "s|!\[Frontend Coverage\].*|![Frontend Coverage](https://img.shields.io/badge/Frontend_Coverage-${{ env.frontend_cov }}%25-${F_COLOR})|g" README.md
          
      - name: Commit changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update coverage badges [skip ci]"
          file_pattern: "README.md"
